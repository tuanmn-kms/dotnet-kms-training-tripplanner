services:
  # React UI - Production
  reactui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kmstraining-reactui
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - kmstraining-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React UI - Development (with hot reload)
  reactui-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kmstraining-reactui-dev
    command: npm run dev -- --host 0.0.0.0 --port 63452
    ports:
      - "63452:63452"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: reactui-node-modules
        target: /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=https://localhost:44391/api
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    restart: unless-stopped
    networks:
      - kmstraining-network
    profiles:
      - development

volumes:
  reactui-node-modules:

networks:
  kmstraining-network:
    driver: bridge
