version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kmstraining-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - kmstraining-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' -C"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # .NET API
  api:
    build:
      context: ./KMSTraining.API
      dockerfile: Dockerfile
    container_name: kmstraining-api
    ports:
      - "7777:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__TripPlannerDatabase=Server=sqlserver;Database=TripPlannerDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__SecretKey=YourSuperSecretKeyForJWTTokenGeneration123456789
      - JwtSettings__Issuer=KMSTraining.API
      - JwtSettings__Audience=KMSTraining.API.Users
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # .NET API - Development (bind mount + hot reload)
  api-dev:
    build:
      context: ./KMSTraining.API
      dockerfile: Dockerfile.dev
    container_name: kmstraining-api-dev
    working_dir: /src
    command: dotnet watch run --project KMSTraining.API.csproj --urls http://0.0.0.0:8080 --property:BaseIntermediateOutputPath=/tmp/obj/ --property:BaseOutputPath=/tmp/bin/
    ports:
      - "7777:8080"
    volumes:
      - type: bind
        source: ./KMSTraining.API
        target: /src
      - type: volume
        source: nuget-cache
        target: /root/.nuget/packages
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__TripPlannerDatabase=Server=sqlserver;Database=TripPlannerDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__SecretKey=YourSuperSecretKeyForJWTTokenGeneration123456789
      - JwtSettings__Issuer=KMSTraining.API
      - JwtSettings__Audience=KMSTraining.API.Users
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    profiles:
      - development

  # React UI
  reactui:
    build:
      context: ./kmstraining.reactui
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:7777/api
    container_name: kmstraining-reactui
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlserver-data:
    driver: local
  nuget-cache:
    driver: local

networks:
  kmstraining-network:
    driver: bridge
