name: React UI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./kmstraining.reactui

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: ./kmstraining.reactui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint --if-present || echo "No lint script found"

    - name: Type check
      run: npx tsc --noEmit || echo "TypeScript check completed"

    - name: Build
      run: npm run build
      env:
        VITE_API_URL: http://localhost:5000

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: ./kmstraining.reactui/dist
        retention-days: 7
