name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore KMSTraining.API/KMSTraining.API.csproj

    - name: Build API
      run: dotnet build KMSTraining.API/KMSTraining.API.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test KMSTraining.Tests/KMSTraining.Tests.csproj --no-build --verbosity normal --configuration Release --collect:"XPlat Code Coverage"

    - name: Generate coverage report
      uses: codecov/codecov-action@v4
      with:
        files: '**/coverage.cobertura.xml'
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
