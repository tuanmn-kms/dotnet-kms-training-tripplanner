name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./KMSTraining.API/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-api:latest
          ghcr.io/${{ github.repository_owner }}/kmstraining-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-ui:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build React UI Docker image (Dev)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile.dev
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:dev
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui-dev:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build React UI Docker image (Prod)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:latest
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:${{ github.sha }}
        build-args: |
          VITE_API_URL=http://localhost:5000
        cache-from: type=gha
        cache-to: type=gha,mode=max
