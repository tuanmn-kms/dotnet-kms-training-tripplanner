name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./KMSTraining.API/Dockerfile
        push: false
        tags: kmstraining-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-ui:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build React UI Docker image (Dev)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile.dev
        push: false
        tags: kmstraining-reactui:dev
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build React UI Docker image (Prod)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile
        push: false
        tags: kmstraining-reactui:latest
        build-args: |
          VITE_API_URL=http://localhost:5000
        cache-from: type=gha
        cache-to: type=gha,mode=max
        continue-on-error: true
