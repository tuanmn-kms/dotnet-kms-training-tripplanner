name: Docker Build

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event.workflow_run.conclusion == 'success'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./KMSTraining.API/Dockerfile
        push: ${{ github.event.workflow_run.conclusion == 'success' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-api:latest
          ghcr.io/${{ github.repository_owner }}/kmstraining-api:${{ github.event.workflow_run.head_sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-ui:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event.workflow_run.conclusion == 'success'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build React UI Docker image (Dev)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile.dev
        push: ${{ github.event.workflow_run.conclusion == 'success' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:dev
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui-dev:${{ github.event.workflow_run.head_sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build React UI Docker image (Prod)
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile
        push: ${{ github.event.workflow_run.conclusion == 'success' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:latest
          ghcr.io/${{ github.repository_owner }}/kmstraining-ui:${{ github.event.workflow_run.head_sha }}
        build-args: |
          VITE_API_URL=http://localhost:5000
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-render:
    name: Deploy to Render
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: [build-api, build-ui]

    steps:
    - name: Trigger API deploy hook
      env:
        RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_API_DEPLOY_HOOK" ]; then
          echo "RENDER_API_DEPLOY_HOOK secret is not set"
          exit 1
        fi
        curl -fsS -X POST "$RENDER_API_DEPLOY_HOOK"

    - name: Trigger UI deploy hook (optional)
      env:
        RENDER_UI_DEPLOY_HOOK: ${{ secrets.RENDER_UI_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_UI_DEPLOY_HOOK" ]; then
          echo "RENDER_UI_DEPLOY_HOOK is not set; skipping UI deploy trigger"
          exit 0
        fi
        curl -fsS -X POST "$RENDER_UI_DEPLOY_HOOK"
