name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-api:
    name: Test .NET API
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test KMSTraining.Tests/KMSTraining.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/**/coverage.cobertura.xml
        badge: true
        format: markdown
        output: both
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: api-coverage
      continue-on-error: true

  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./kmstraining.reactui

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: ./kmstraining.reactui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build
      env:
        VITE_API_URL: http://localhost:5000

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ui-build
        path: ./kmstraining.reactui/dist
        retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test-api, build-ui]
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./KMSTraining.API/Dockerfile
        push: false
        tags: kmstraining-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build UI image
      uses: docker/build-push-action@v5
      with:
        context: ./kmstraining.reactui
        file: ./kmstraining.reactui/Dockerfile.dev
        push: false
        tags: kmstraining-ui:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
