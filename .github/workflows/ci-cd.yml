name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: Test .NET API
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: 70

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Check .NET formatting
      run: dotnet format KMSTraining.API/KMSTraining.API.csproj --verify-no-changes --severity error

    - name: Scan NuGet dependencies for vulnerabilities
      shell: pwsh
      run: |
        dotnet list KMSTraining.API/KMSTraining.API.csproj package --vulnerable --include-transitive --format json > nuget-vulnerabilities.json
        if (Select-String -Path nuget-vulnerabilities.json -Pattern '"severity"' -Quiet) {
          Write-Error "NuGet vulnerability scan found vulnerable packages."
          exit 1
        }

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test KMSTraining.Tests/KMSTraining.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage --settings KMSTraining.Tests/coverlet.runsettings

    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/**/coverage.cobertura.xml
        badge: true
        format: markdown
        output: both
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: api-coverage
      continue-on-error: true

    - name: Enforce coverage threshold
      shell: pwsh
      run: |
        $coverageFile = Get-ChildItem -Path ./coverage -Filter coverage.cobertura.xml -Recurse | Select-Object -First 1
        if (-not $coverageFile) {
          Write-Error "Coverage file not found in ./coverage"
          exit 1
        }

        [xml]$coverageXml = Get-Content $coverageFile.FullName
        $lineRate = [double]$coverageXml.coverage.'line-rate'
        $lineCoveragePercent = [math]::Round($lineRate * 100, 2)
        $threshold = [double]$env:COVERAGE_THRESHOLD

        Write-Host "Line coverage: $lineCoveragePercent% (threshold: $threshold%)"
        if ($lineCoveragePercent -lt $threshold) {
          Write-Error "Coverage $lineCoveragePercent% is below threshold $threshold%"
          exit 1
        }

  build-ui:
    name: Validate React UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./kmstraining.reactui

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: ./kmstraining.reactui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Scan npm dependencies for vulnerabilities
      run: npm audit --audit-level=high

    - name: Lint
      run: npm run lint --if-present || echo "No lint script found"

    - name: Type check
      run: npx tsc --noEmit || echo "TypeScript check completed"

    - name: Build
      run: npm run build
      env:
        VITE_API_URL: http://localhost:5000

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: ./kmstraining.reactui/dist
        retention-days: 7
