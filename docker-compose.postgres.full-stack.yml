version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kmstraining-postgres
    environment:
      - POSTGRES_DB=TripPlannerDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Postgres123!}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kmstraining-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TripPlannerDB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # .NET API
  api:
    build:
      context: .
      dockerfile: ./KMSTraining.API/Dockerfile
    container_name: kmstraining-api
    ports:
      - "7778:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=postgres
      - ConnectionStrings__TripPlannerDatabase=Host=kmstraining-postgres;Port=5432;Database=TripPlannerDB;Username=postgres;Password=${POSTGRES_PASSWORD:-Postgres123!}
      - JwtSettings__SecretKey=NW7WZsDn5nA9D22fu6NCQsbGMB3ciyQ9unMOVFrKMcB
      - JwtSettings__Issuer=KMSTraining.API
      - JwtSettings__Audience=KMSTraining.API.Users
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # .NET API - Development (bind mount + hot reload)
  api-dev:
    build:
      context: ./KMSTraining.API
      dockerfile: Dockerfile.dev
    container_name: kmstraining-api-dev
    working_dir: /src
    command: dotnet watch run --project KMSTraining.API.csproj --urls http://0.0.0.0:8080 --property:BaseIntermediateOutputPath=/tmp/obj/ --property:BaseOutputPath=/tmp/bin/
    ports:
      - "7778:8080"
    volumes:
      - type: bind
        source: ./KMSTraining.API
        target: /src
      - type: volume
        source: nuget-cache
        target: /root/.nuget/packages
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=postgres
      - ConnectionStrings__TripPlannerDatabase=Host=kmstraining-postgres;Port=5432;Database=TripPlannerDB;Username=postgres;Password=${POSTGRES_PASSWORD:-Postgres123!}
      - JwtSettings__SecretKey=NW7WZsDn5nA9D22fu6NCQsbGMB3ciyQ9unMOVFrKMcB
      - JwtSettings__Issuer=KMSTraining.API
      - JwtSettings__Audience=KMSTraining.API.Users
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    profiles:
      - development

  # React UI
  reactui:
    build:
      context: ./kmstraining.reactui
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:7778/api
    container_name: kmstraining-reactui
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kmstraining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
    driver: local
  nuget-cache:
    driver: local

networks:
  kmstraining-network:
    driver: bridge
